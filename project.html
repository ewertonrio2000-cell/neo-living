<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto NEO.LIVING — arquitetura contemporânea autoral.">
    <title>NEO.LIVING — Projeto</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/project.css">
</head>
<body>
    <div data-include="header"></div>

    <main id="project-root">
        <!-- Loaded dynamically by JS based on ?id= query param -->
        <div class="project-404">
            <p class="project-404__code">…</p>
            <p class="project-404__title">Carregando projeto.</p>
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
        <button class="lightbox__close" aria-label="Fechar" id="lb-close">×</button>
        <button class="lightbox__prev" aria-label="Anterior" id="lb-prev">‹</button>
        <button class="lightbox__next" aria-label="Próxima" id="lb-next">›</button>
        <img class="lightbox__img" id="lb-img" alt="">
        <p class="lightbox__counter" id="lb-counter"></p>
    </div>

    <script src="https://unpkg.com/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/projects.js"></script>
