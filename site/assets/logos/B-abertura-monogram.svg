<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="NEO.LIVING monogram">
    <!-- Outer portal (arch on top, vertical sides, open at bottom) -->
    <path d="M 14 56 L 14 28 A 18 18 0 0 1 50 28 L 50 56" />
    <!-- Inner two verticals (suggest "N" / "neo") -->
    <line x1="24" y1="42" x2="24" y2="56" stroke-width="1.2" />
    <line x1="40" y1="42" x2="40" y2="56" stroke-width="1.2" />
    <!-- Top horizon line (subtle "L" of LIVING) -->
    <line x1="14" y1="56" x2="50" y2="56" stroke-width="1.2" />
</svg>
