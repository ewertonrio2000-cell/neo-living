<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" aria-label="NEO.LIVING monogram">
    <!-- Four stacked horizontal blades — progressive widths suggesting cantilevered volumes -->
    <line x1="14" y1="20" x2="44" y2="20" />
    <line x1="14" y1="30" x2="50" y2="30" />
    <line x1="14" y1="40" x2="38" y2="40" />
    <line x1="14" y1="50" x2="50" y2="50" />
    <!-- Vertical anchor on the left (structural mast) -->
    <line x1="14" y1="20" x2="14" y2="50" stroke-width="1.8" />
</svg>
